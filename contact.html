<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Contact | Octave</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<body style="overflow-y: auto; overflow-x: hidden;">
    <div class="mobile-app" style="display: block; padding: 20px 20px 180px 20px; box-sizing: border-box; width: 100%; min-height: 100vh;">
        
        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 40px; margin-top: 10px; padding-left: 4px;">
            <a href="index.html" class="icon-btn" style="text-decoration: none;"><i class="fa-solid fa-arrow-left"></i></a>
            <h1 style="font-size: 24px; font-weight: 700;">Contact Support</h1>
        </div>

        <div style="text-align: center; margin-bottom: 40px;">
            <div style="width: 100px; height: 100px; background: linear-gradient(135deg, #0088cc 0%, #00a8e5 100%); border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 50px; color: #fff; margin: 0 auto 24px; box-shadow: 0 10px 30px rgba(0, 136, 204, 0.4);">
                <i class="fa-brands fa-telegram"></i>
            </div>
            <h2 style="font-size: 28px; font-weight: 800; margin-bottom: 8px;">Mohsen</h2>
            <p style="color: var(--text-secondary); font-size: 16px;">Lead Developer & Support</p>
        </div>

        <div class="glass-panel shadow-heavy" style="padding: 24px; border-radius: 20px; text-align: center;">
            <h3 style="margin-bottom: 12px;">Get in Touch</h3>
            <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; line-height: 1.6;">Have a feature request, bug report, or need technical support? Send a direct message on Telegram for the fastest response.</p>
            
            <a href="https://t.me/ucvezw" target="_blank" class="btn-primary" style="display: flex; align-items: center; justify-content: center; width: 100%; background: #0088cc; color: #ffffff; text-decoration: none; padding: 16px; font-size: 16px; border-radius: 12px; font-weight: 600;">
                <i class="fa-brands fa-telegram" style="margin-right: 8px; font-size: 20px;"></i> Message @ucvezw
            </a>
        </div>
        
        <div style="height: 100px; width: 100%;"></div>
    </div>
