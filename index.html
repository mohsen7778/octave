<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octave</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="mobile-app">
        
        <header class="app-header">
            <div class="header-brand">
                <i class="fa-solid fa-wave-square brand-icon"></i>
                <span>Octave</span>
            </div>
            <div class="header-actions">
                <button class="clay-btn-sm"><i class="fa-solid fa-gear"></i></button>
            </div>
        </header>

        <main class="main-content scrollable" id="dynamic-content">
            
            <section class="home-section">
                <div class="section-header">
                    <h2 class="section-title">Recently Played</h2>
                </div>
                
                <div class="horizontal-scroll">
                    <div class="track-card">
                        <div class="card-art"></div>
                        <div class="card-title">Blinding Lights</div>
                        <div class="card-artist">The Weeknd</div>
                    </div>
                    <div class="track-card">
                        <div class="card-art"></div>
                        <div class="card-title">Midnight City</div>
                        <div class="card-artist">M83</div>
                    </div>
                    <div class="track-card">
                        <div class="card-art"></div>
                        <div class="card-title">Nightcall</div>
                        <div class="card-artist">Kavinsky</div>
                    </div>
                </div>
            </section>

            <section class="home-section mt-30">
                <h2 class="section-title">Your Playlists</h2>
                <div class="vertical-list">
                    <div class="list-item clay-panel">
                        <div class="item-icon"><i class="fa-solid fa-heart"></i></div>
                        <div class="item-info">
                            <div class="item-title">Liked Songs</div>
                            <div class="item-sub">142 tracks</div>
                        </div>
                        <button class="play-circle"><i class="fa-solid fa-play"></i></button>
                    </div>

                    <div class="list-item clay-panel">
                        <div class="item-icon custom-art"></div>
                        <div class="item-info">
                            <div class="item-title">Late Night Drive</div>
                            <div class="item-sub">45 tracks</div>
                        </div>
                    </div>

                    <div class="list-item clay-panel" id="create-playlist-btn">
                        <div class="item-icon add-icon"><i class="fa-solid fa-plus"></i></div>
                        <div class="item-info">
                            <div class="item-title">Create Playlist</div>
                        </div>
                    </div>
                </div>
            </section>
            
            <div class="bottom-spacer"></div>
        </main>

        <div class="mini-player">
            <div class="mini-progress-bar">
                <div class="mini-progress-fill" style="width: 45%;"></div>
            </div>
            <div class="mini-player-inner">
                <div class="mini-art"></div>
                <div class="mini-info">
                    <div class="mini-title">Blinding Lights</div>
                    <div class="mini-artist">The Weeknd</div>
                </div>
                <div class="mini-controls">
                    <button class="icon-btn"><i class="fa-regular fa-heart"></i></button>
                    <button class="icon-btn play-active"><i class="fa-solid fa-pause"></i></button>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" data-target="home">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </div>
            <div class="nav-item" data-target="search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Search</span>
            </div>
            <div class="nav-item" data-target="library">
                <i class="fa-solid fa-layer-group"></i>
                <span>Library</span>
            </div>
        </nav>

    </div>

</body>
</html>
